mic_version: "0.1.1"
contract_id: "example-change-control-001"
engine_id: "example.change_control.verify"
task: "verify_regulated_change"

change:
  change_id: "CHG-001"
  target_system: "critical-system-example"
  requested_action: "apply_configuration_change"

constraints:
  allow_network: false
  require_audit: true
  require_dual_authorisation: true
  require_rollback_plan: true
  require_change_window: true
  max_runtime_seconds: 180
  max_memory_mb: 512

actions:
  - "verify_change_request"
  - "verify_authorisations"
  - "verify_change_window"
  - "verify_rollback_plan"
  - "generate_change_evidence"
  - "write_audit_event"

output:
  format: "json"
  fields:
    - "change_allowed"
    - "failed_controls"
    - "approval_count"
    - "rollback_plan_hash"
    - "audit_id"

signature: "PLACEHOLDER_SIGNATURE_REPLACE_AFTER_SIGNING"
